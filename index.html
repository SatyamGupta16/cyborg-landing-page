<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBERNEXUS | The Future is Here</title>
    <meta name="description" content="Experience AI-powered cybernetic evolution with CYBERNEXUS.">
    
    <!-- Open Graph / SEO -->
    <meta property="og:title" content="CYBERNEXUS">
    <meta property="og:description" content="Experience AI-powered cybernetic evolution.">
    <meta property="og:type" content="website">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    
    <!-- Custom Cursor -->
    <div class="custom-cursor"></div>
    <div class="custom-cursor-glow"></div>

    <!-- Scroll Progress Bar -->
    <div class="scroll-progress"></div>

    <!-- Navbar -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="#" class="logo">
                <span class="logo-text">CYBERNEXUS</span>
                <span class="logo-dot"></span>
            </a>
            
            <ul class="nav-links">
                <li><a href="#home" class="active">Home</a></li>
                <li><a href="#technology">Technology</a></li>
                <li><a href="#evolution">Evolution</a></li>
                <li><a href="#research">Research</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
            
            <a href="#beta" class="btn btn-primary cta-btn">Join Beta</a>
            
            <!-- Mobile Menu Toggle -->
            <button class="mobile-toggle" aria-label="Toggle Navigation">
                <span class="hamburger"></span>
            </button>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main>
        <!-- Hero Section -->
        <section id="home" class="hero-section">
            <canvas id="particles-canvas"></canvas>
            <div class="hero-grid-bg"></div>
            
            <div class="container hero-container">
                <div class="hero-content">
                    <h1 class="hero-title">
                        <span class="gradient-text">THE FUTURE</span><br>
                        ISN'T COMING.<br>
                        IT'S ALREADY <span class="glitch-text" data-text="HERE.">HERE.</span>
                    </h1>
                    <p class="hero-subtitle">Experience AI-powered cybernetic evolution.</p>
                    <div class="hero-buttons">
                        <a href="#explore" class="btn btn-primary ripple-btn">Explore</a>
                        <a href="#beta" class="btn btn-secondary ripple-btn">Become Cyborg</a>
                    </div>
                </div>
                
                <div class="hero-illustration">
                    <div class="parallax-element" data-speed="0.05">
                        <div class="cyborg-placeholder">
                            <div class="cyber-ring ring-1"></div>
                            <div class="cyber-ring ring-2"></div>
                            <div class="cyber-ring ring-3"></div>
                            <div class="core-glow"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- JS -->
    <script src="js/main.js"></script>
    <script src="js/navbar.js"></script>
    <script src="js/cursor.js"></script>
    <script src="js/particles.js"></script>
    <!-- Add more JS files as we build sections -->
</body>
</html>
